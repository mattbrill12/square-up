app = "square-up-api"
primary_region = "ord"

[build]

[env]
  PORT = "8080"
  DB_PATH = "/data/squares.db"
  ALLOWED_ORIGIN = "*"

[[mounts]]
  source = "squares_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/healthz"
  protocol = "http"
  timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
