# fly.toml app configuration file generated for square-up on 2026-05-09T15:31:52-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'square-up'
primary_region = 'ord'

[build]

[env]
  ALLOWED_ORIGIN = '*'
  DB_PATH = '/data/squares.db'
  PORT = '8080'
  STATIC_DIR = '/app/public'

[[mounts]]
  source = 'squares_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'
    protocol = 'http'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
